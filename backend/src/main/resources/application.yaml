spring:
  application:
    name: backend

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 52MB

  elasticsearch:
    uris: https://localhost:9200
    username: elastic
    password: ${ELASTIC_PASSWORD}

  ai:
    ollama:
      base-url: http://localhost:11434
      init:
        pull-model-strategy: never
      chat:
        options:
          model: llama3.2:3b
      embedding:
        options:
          model: bge-m3

app:
  demo:
    n8n-webhook-url: http://localhost:5678/webhook/consultation-multi-agent
  interaction-log:
    text-path: ./log/text-interactions.jsonl
    voice-path: ./log/voice-interactions.jsonl
  embedding-backfill:
    initial-delay: 5000
    fixed-delay: 30000
  voice:
    whisper-base-url: http://localhost:8100
    whisper-timeout-seconds: 60
    max-audio-bytes: 52428800
    n8n-webhook-url: http://localhost:5678/webhook/consultation-multi-agent
    n8n-timeout-seconds: 300
    language: ko
    stt-prompt: "고객 서비스 상담입니다. 주문번호 예시: DLV-1001, DLV-2045, RFD-1003, RFD-2087. 숫자는 반드시 아라비아 숫자로 표기하고, 하이픈(-)은 그대로 사용합니다."
  tts:
    enabled: true
    base-url: https://api.openai.com
    api-key: ${OPENAI_API_KEY}
    timeout-seconds: 60
    max-text-chars: 4096
    model: gpt-4o-mini-tts
    voice: alloy
    response-format: mp3
