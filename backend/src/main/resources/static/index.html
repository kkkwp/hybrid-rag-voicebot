<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>상담 Agent</title>
  <style>
    @font-face {
      font-family: 'Hamlet';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2110@1.0/Hahmlet-Regular.woff2') format('woff2');
      font-weight: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Hamlet';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2110@1.0/Hahmlet-Bold.woff2') format('woff2');
      font-weight: 700; font-display: swap;
    }

    :root {
      --bg: #f5f1e8;
      --ink: #1f2933;
      --muted: #667085;
      --card: #fffdf7;
      --line: #ddcfb8;
      --accent: #1f6f5b;
      --accent-light: #e8f1ec;
      --accent-2: #c96f3f;
      --danger: #b42318;
      --user-bubble: #1f6f5b;
      --shadow: 0 4px 20px rgba(85,63,36,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: radial-gradient(circle at top left, rgba(31,111,91,0.15), transparent 30rem),
      linear-gradient(135deg, #f8f3e8 0%, #efe5d0 100%);
      font-family: "Hamlet", Georgia, serif;
      color: var(--ink);
    }

    /* ── 헤더 ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      background: rgba(255,253,247,0.9);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
      flex-shrink: 0;
      z-index: 10;
    }
    header .avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 1rem;
    }
    header .title { font-weight: 700; font-size: 1.05rem; }
    header .subtitle { font-size: 0.8rem; color: var(--muted); }

    /* ── 메인 레이아웃 ── */
    .main-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── 채팅 영역 ── */
    #chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
    }

    #chat-inner {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 24px 16px;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── 우측 패널 ── */
    #progress-panel {
      width: 280px;
      flex-shrink: 0;
      border-left: 1px solid var(--line);
      background: rgba(255,253,247,0.7);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--line);
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      flex-shrink: 0;
    }

    #progress-steps {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .step-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      position: relative;
    }
    .step-item:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 8px;
      top: 26px;
      bottom: -8px;
      width: 1px;
      background: var(--line);
    }

    .step-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem;
      margin-top: 1px;
    }
    .step-dot.waiting  { background: #e8e2d6; border: 2px solid #c8c0b0; }
    .step-dot.running  { background: #fff4d6; border: 2px solid var(--accent-2); animation: pulse 1s infinite; }
    .step-dot.done     { background: var(--accent); color: white; }
    .step-dot.error    { background: var(--danger); color: white; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.15); opacity: 0.75; }
    }

    .step-text {
      flex: 1;
      font-size: 0.83rem;
      line-height: 1.4;
    }
    .step-label {
      color: var(--ink);
      font-weight: 600;
    }
    .step-msg {
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 1px;
      word-break: break-all;
    }

    /* ── n8n 상태 배지 ── */
    #n8n-status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--line);
      font-size: 0.8rem;
      flex-shrink: 0;
    }
    .n8n-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #c8c0b0;
    }
    .n8n-dot.up   { background: #22c55e; box-shadow: 0 0 5px rgba(34,197,94,0.5); }
    .n8n-dot.down { background: var(--danger); }

    .panel-idle {
      padding: 20px 16px;
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.6;
      text-align: center;
    }

    /* ── 메시지 row ── */
    .msg-row { display: flex; gap: 10px; align-items: flex-end; }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 0.75rem; font-weight: 700;
    }
    .msg-row.user .msg-avatar { background: #8b5cf6; }

    .msg-body { max-width: 72%; display: flex; flex-direction: column; gap: 4px; }
    .msg-row.user .msg-body { align-items: flex-end; }

    .bubble {
      padding: 12px 16px; border-radius: 20px;
      line-height: 1.6; font-size: 0.97rem; word-break: break-word;
    }
    .msg-row.user .bubble {
      background: var(--user-bubble); color: white;
      border-bottom-right-radius: 4px;
    }
    .msg-row.bot .bubble {
      background: var(--card); border: 1px solid var(--line);
      box-shadow: var(--shadow); border-bottom-left-radius: 4px;
      white-space: pre-wrap;
    }

    .audio-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 999px;
      background: rgba(255,255,255,0.2);
      font-size: 0.85rem; color: rgba(255,255,255,0.9);
    }

    .msg-time { font-size: 0.75rem; color: var(--muted); padding: 0 4px; }

    .transcription-tag {
      font-size: 0.8rem; color: var(--accent);
      padding: 4px 10px; background: var(--accent-light);
      border-radius: 999px; margin-bottom: 2px;
    }

    .bubble-actions {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid var(--line);
    }
    .pill {
      padding: 4px 10px; border-radius: 999px;
      border: 1px solid var(--line); background: #f8efe0;
      color: #5c4630; font-size: 0.78rem;
    }
    .play-btn {
      padding: 5px 14px; border-radius: 999px;
      border: 1px solid rgba(31,111,91,0.3);
      background: var(--accent-light); color: var(--accent);
      font-family: inherit; font-size: 0.82rem; font-weight: 700;
      cursor: pointer;
    }
    .play-btn:disabled { opacity: 0.5; cursor: wait; }

    .agent-toggle {
      margin-top: 10px; font-size: 0.82rem;
      color: var(--muted); cursor: pointer; user-select: none;
    }
    .agent-detail {
      margin-top: 8px; padding: 12px; border-radius: 14px;
      background: #f6eddc; font-size: 0.88rem;
      line-height: 1.5; color: #4c3a2c;
    }
    .agent-detail h4 { margin-bottom: 6px; color: var(--accent); font-size: 0.85rem; letter-spacing: 0.05em; }
    .agent-detail p { white-space: pre-wrap; }

    .typing { display: flex; align-items: center; gap: 5px; padding: 12px 16px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .error-bubble { color: var(--danger); font-size: 0.9rem; padding: 10px 14px; }

    /* ── 입력바 ── */
    #input-bar {
      flex-shrink: 0;
      padding: 12px 16px 16px;
      background: rgba(255,253,247,0.92);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }

    #attach-preview {
      display: none; align-items: center; gap: 8px;
      padding: 8px 14px; margin-bottom: 8px;
      border-radius: 14px; background: var(--accent-light);
      border: 1px solid rgba(31,111,91,0.25);
      font-size: 0.88rem; color: var(--accent);
    }
    #attach-preview.visible { display: flex; }
    #attach-preview .filename { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #attach-preview .remove-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 1.1rem; line-height: 1; padding: 0 2px;
    }

    .input-row {
      display: flex; gap: 8px; align-items: flex-end;
      max-width: 860px; margin: 0 auto;
    }

    #question {
      flex: 1; resize: none;
      border: 1px solid var(--line); border-radius: 20px;
      padding: 12px 16px;
      font: 1rem/1.5 "Hamlet", Georgia, serif;
      color: var(--ink); background: #fffaf0;
      outline: none; max-height: 140px; overflow-y: auto;
    }
    #question:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(31,111,91,0.1); }

    .icon-btn {
      width: 44px; height: 44px; border-radius: 50%;
      border: 1px solid var(--line); background: var(--card);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0; transition: background 0.15s;
    }
    .icon-btn:hover { background: var(--accent-light); }
    .icon-btn.recording { background: var(--accent-2); border-color: var(--accent-2); }

    #send-btn {
      width: 44px; height: 44px; border-radius: 50%;
      border: none; background: var(--accent); color: white;
      font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity 0.15s;
    }
    #send-btn:disabled { opacity: 0.45; cursor: wait; }

    #file-input { display: none; }
    .input-hint { text-align: center; font-size: 0.75rem; color: var(--muted); margin-top: 8px; }

    @media (max-width: 720px) {
      #progress-panel { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="avatar">AI</div>
  <div>
    <div class="title">상담 Agent</div>
    <div class="subtitle">텍스트 · 음성녹음 파일 · 실시간 마이크</div>
  </div>
</header>

<div class="main-layout">
  <!-- ── 채팅 영역 ── -->
  <div id="chat-area">
    <div id="chat">
      <div id="chat-inner">
        <div class="msg-row bot">
          <div class="msg-avatar">AI</div>
          <div class="msg-body">
            <div class="bubble">
              안녕하세요! 배송, 환불, 교환 관련 문의를 도와드립니다.<br>
              아래 입력창에 질문을 입력하거나, 🎤 버튼으로 실시간 녹음, 📎 버튼으로 음성 파일을 첨부해 보내주세요.
            </div>
            <div class="msg-time">n8n Execute workflow를 먼저 활성화하세요</div>
          </div>
        </div>
      </div>
    </div>

    <div id="input-bar">
      <div id="attach-preview">
        <span>🎵</span>
        <span class="filename" id="attach-filename"></span>
        <button class="remove-btn" id="remove-attach">✕</button>
      </div>
      <div class="input-row">
        <input type="file" id="file-input" accept="audio/*">
        <button class="icon-btn" id="attach-btn" title="음성 파일 첨부">📎</button>
        <button class="icon-btn" id="record-btn" title="실시간 마이크 녹음">🎤</button>
        <textarea id="question" rows="1" placeholder="질문을 입력하세요…">배송이 안 와요. 주문번호 DLV-1001입니다.</textarea>
        <button id="send-btn" title="전송">➤</button>
      </div>
      <div class="input-hint">Enter 전송 · Shift+Enter 줄바꿈</div>
    </div>
  </div>

  <!-- ── 우측 진행 패널 ── -->
  <aside id="progress-panel">
    <div class="panel-header">Workflow 진행 상태</div>
    <div id="n8n-status-bar">
      <span class="n8n-dot" id="n8n-dot"></span>
      <span id="n8n-label" style="color:var(--muted)">n8n 확인 중…</span>
    </div>
    <div id="progress-steps">
      <div class="panel-idle">질문을 전송하면<br>워크플로우 진행 상태가<br>여기에 실시간으로 표시됩니다.</div>
    </div>
  </aside>
</div>

<script>
  const chatScroll   = document.getElementById('chat');
  const chatEl       = document.getElementById('chat-inner');
  const questionEl   = document.getElementById('question');
  const sendBtn      = document.getElementById('send-btn');
  const attachBtn    = document.getElementById('attach-btn');
  const fileInput    = document.getElementById('file-input');
  const recordBtn    = document.getElementById('record-btn');
  const attachPreview  = document.getElementById('attach-preview');
  const attachFilename = document.getElementById('attach-filename');
  const removeAttach   = document.getElementById('remove-attach');
  const progressSteps  = document.getElementById('progress-steps');

  let attachedFile = null;
  let recorder = null, recChunks = [], recStream = null;
  let answerAudio = null;
  let activePlayBtn = null;
  const cachedAudioUrls = new Set();
  let activeEventSource = null;

  // ── Step 정의 (표시 순서) ──
  const STEP_DEFS = [
    { key: 'received',         label: '요청 수신' },
    { key: 'transcribing',     label: 'Whisper 전사 중' },
    { key: 'transcribed',      label: '전사 완료' },
    { key: 'n8n_routing',      label: 'n8n 라우팅 중' },
    { key: 'routing_done',     label: '라우팅 완료' },
    { key: 'agent_start:delivery',      label: 'Delivery Agent' },
    { key: 'agent_done:delivery',       label: 'Delivery Agent 완료' },
    { key: 'agent_start:refundExchange', label: 'RefundExchange Agent' },
    { key: 'agent_done:refundExchange',  label: 'RefundExchange Agent 완료' },
    { key: 'aggregator_start', label: 'Aggregator LLM' },
    { key: 'aggregator_done',  label: '답변 생성 완료' },
  ];

  // ── textarea 자동 높이 ──
  questionEl.addEventListener('input', () => {
    questionEl.style.height = 'auto';
    questionEl.style.height = Math.min(questionEl.scrollHeight, 140) + 'px';
  });
  questionEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  });
  sendBtn.addEventListener('click', handleSend);

  // ── 파일 첨부 ──
  attachBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    attachedFile = file;
    attachFilename.textContent = file.name;
    attachPreview.classList.add('visible');
    fileInput.value = '';
  });
  removeAttach.addEventListener('click', clearAttach);
  function clearAttach() {
    attachedFile = null;
    attachPreview.classList.remove('visible');
    attachFilename.textContent = '';
  }

  // ── 실시간 녹음 ──
  recordBtn.addEventListener('click', async () => {
    if (recorder && recorder.state === 'recording') { recorder.stop(); return; }
    try {
      recStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      recChunks = [];
      const mime = preferredMime();
      recorder = mime ? new MediaRecorder(recStream, { mimeType: mime }) : new MediaRecorder(recStream);
      recorder.ondataavailable = (e) => { if (e.data?.size > 0) recChunks.push(e.data); };
      recorder.onstop = () => {
        const blob = new Blob(recChunks, { type: recChunks[0]?.type || 'audio/webm' });
        attachedFile = new File([blob], 'recording.webm', { type: blob.type });
        attachFilename.textContent = 'recording.webm (녹음)';
        attachPreview.classList.add('visible');
        recordBtn.classList.remove('recording');
        recordBtn.title = '실시간 마이크 녹음';
        stopStream();
      };
      recorder.start();
      recordBtn.classList.add('recording');
      recordBtn.title = '녹음 중… 클릭하면 종료';
    } catch (err) {
      appendError('마이크를 사용할 수 없습니다: ' + err.message);
    }
  });

  // ── 전송 ──
  async function handleSend() {
    const text = questionEl.value.trim();
    if (!text && !attachedFile) return;
    if (sendBtn.disabled) return;
    setSending(true);
    if (attachedFile) {
      await sendVoice(text);
    } else {
      await sendText(text);
    }
    setSending(false);
  }

  async function sendText(question) {
    appendUserBubble(question);
    questionEl.value = ''; questionEl.style.height = 'auto';

    const sessionId = crypto.randomUUID();
    const loadingRow = appendLoading();
    const startedAt = performance.now();

    await openProgress(sessionId);

    try {
      const res = await fetch('/demo/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Session-Id': sessionId },
        body: JSON.stringify({ question, size: 2, sessionId })
      });
      const payload = await res.json();
      const data = normalizePayload(payload);
      const elapsed = ((performance.now() - startedAt) / 1000).toFixed(1);
      if (!res.ok || data.error) throw new Error(data.body || data.error || `HTTP ${res.status}`);
      loadingRow.remove();
      appendBotBubble(data, elapsed);
    } catch (err) {
      loadingRow.remove();
      appendError(err.message);
      markProgressError(err.message);
    }
  }

  async function sendVoice(textHint) {
    const file = attachedFile;
    clearAttach();
    appendUserVoiceBubble(file.name, textHint);
    questionEl.value = ''; questionEl.style.height = 'auto';

    const sessionId = crypto.randomUUID();
    const loadingRow = appendLoading();
    const startedAt = performance.now();

    await openProgress(sessionId);

    try {
      const fd = new FormData();
      fd.append('audio', file, file.name);
      const res = await fetch('/voice/ask', {
        method: 'POST', body: fd,
        headers: { 'X-Session-Id': sessionId }
      });
      const payload = await res.json();
      const data = normalizePayload(payload.answer || {});
      const elapsed = ((performance.now() - startedAt) / 1000).toFixed(1);
      if (!res.ok) throw new Error(payload.message || `HTTP ${res.status}`);
      loadingRow.remove();
      if (payload.transcription?.text) appendTranscription(payload.transcription.text);
      appendBotBubble(data, elapsed);
    } catch (err) {
      loadingRow.remove();
      appendError(err.message);
      markProgressError(err.message);
    }
  }

  // ── SSE 진행 패널 ──
  function openProgress(sessionId) {
    if (activeEventSource) { activeEventSource.close(); activeEventSource = null; }
    clearProgressPanel();

    return new Promise((resolve) => {
      const es = new EventSource('/progress/stream?sessionId=' + encodeURIComponent(sessionId));
      activeEventSource = es;

      es.onopen = () => resolve();

      es.addEventListener('progress', (e) => {
        try {
          const { step, message } = JSON.parse(e.data);
          upsertStep(step, message, 'done');
        } catch {}
      });

      es.addEventListener('complete', () => {
        es.close(); activeEventSource = null;
        markAllDone();
      });

      es.addEventListener('error', (e) => {
        es.close(); activeEventSource = null;
        if (e.data) markProgressError(e.data);
      });

      // SSE 연결 실패 시에도 fetch는 진행되어야 하므로 타임아웃 fallback
      setTimeout(() => resolve(), 500);
    });
  }

  function clearProgressPanel() {
    progressSteps.innerHTML = '';
  }

  function upsertStep(step, message, state) {
    let el = progressSteps.querySelector(`[data-step="${CSS.escape(step)}"]`);
    if (!el) {
      el = document.createElement('div');
      el.className = 'step-item';
      el.dataset.step = step;
      el.innerHTML = `
        <div class="step-dot ${state}"></div>
        <div class="step-text">
          <div class="step-label">${esc(stepLabel(step))}</div>
          <div class="step-msg">${esc(message)}</div>
        </div>`;
      progressSteps.appendChild(el);
    } else {
      el.querySelector('.step-dot').className = 'step-dot ' + state;
      el.querySelector('.step-msg').textContent = message;
    }
    progressSteps.scrollTop = progressSteps.scrollHeight;
  }

  function markAllDone() {
    progressSteps.querySelectorAll('.step-dot.running').forEach(d => {
      d.className = 'step-dot done';
      d.textContent = '✓';
    });
    progressSteps.querySelectorAll('.step-dot.done').forEach(d => {
      d.textContent = '✓';
    });
  }

  function markProgressError(msg) {
    const el = document.createElement('div');
    el.className = 'step-item';
    el.innerHTML = `
      <div class="step-dot error">✕</div>
      <div class="step-text">
        <div class="step-label" style="color:var(--danger)">오류</div>
        <div class="step-msg">${esc(msg)}</div>
      </div>`;
    progressSteps.appendChild(el);
  }

  function stepLabel(step) {
    const def = STEP_DEFS.find(d => d.key === step);
    if (def) return def.label;
    if (step.startsWith('agent_start:')) return step.replace('agent_start:', '') + ' Agent 실행 중';
    if (step.startsWith('agent_done:'))  return step.replace('agent_done:', '')  + ' Agent 완료';
    return step;
  }

  // ── 렌더 헬퍼 ──
  function appendUserBubble(text) {
    const row = makeRow('user');
    row.innerHTML = `
      <div class="msg-avatar">나</div>
      <div class="msg-body">
        <div class="bubble">${esc(text)}</div>
        <div class="msg-time">${now()}</div>
      </div>`;
    chatEl.appendChild(row); scrollBottom();
  }

  function appendUserVoiceBubble(filename, hint) {
    const row = makeRow('user');
    row.innerHTML = `
      <div class="msg-avatar">나</div>
      <div class="msg-body">
        <div class="bubble">
          <div class="audio-pill">🎵 ${esc(filename)}</div>
          ${hint ? `<div style="margin-top:6px">${esc(hint)}</div>` : ''}
        </div>
        <div class="msg-time">${now()}</div>
      </div>`;
    chatEl.appendChild(row); scrollBottom();
  }

  function appendTranscription(text) {
    const row = makeRow('bot');
    row.innerHTML = `
      <div class="msg-avatar">AI</div>
      <div class="msg-body">
        <div class="transcription-tag">🎙 음성 전사: ${esc(text)}</div>
      </div>`;
    chatEl.appendChild(row); scrollBottom();
  }

  function appendBotBubble(data, elapsed) {
    const finalAnswer = data.finalAnswer || '(응답 없음)';
    const routing = data.routing || {};
    const agents = Array.isArray(routing.agents) ? routing.agents : [];
    const metadata = data.metadata || {};
    const agentResults = Array.isArray(data.agentResults) ? data.agentResults : [];

    const row = makeRow('bot');
    const id = 'bot-' + Date.now();
    row.innerHTML = `
      <div class="msg-avatar">AI</div>
      <div class="msg-body">
        <div class="bubble" id="${id}">
          <div>${esc(finalAnswer)}</div>
          <div class="bubble-actions">
            <button class="play-btn" data-answer="${esc(finalAnswer)}">▶ 음성 재생</button>
            <span class="pill">${esc(elapsed)}s</span>
            <span class="pill">${esc(routing.strategy || metadata.routerStrategy || '-')}</span>
            <span class="pill">agents: ${esc(agents.join(', ') || '-')}</span>
            ${metadata.elapsedMillis != null ? `<span class="pill">backend ${metadata.elapsedMillis}ms</span>` : ''}
          </div>
          ${agentResults.length ? `
            <div class="agent-toggle" data-open="false">▸ 에이전트 상세 보기</div>
            <div class="agent-detail" style="display:none">
              ${agentResults.map(renderAgentDetail).join('')}
            </div>` : ''}
        </div>
        <div class="msg-time">${now()}</div>
      </div>`;

    chatEl.appendChild(row);
    const bubble = row.querySelector(`#${id}`);
    bubble.querySelector('.play-btn')?.addEventListener('click', (e) => {
      playAnswer(e.currentTarget.dataset.answer, e.currentTarget);
    });
    const toggle = bubble.querySelector('.agent-toggle');
    const detail = bubble.querySelector('.agent-detail');
    if (toggle && detail) {
      toggle.addEventListener('click', () => {
        const open = toggle.dataset.open === 'true';
        toggle.dataset.open = String(!open);
        toggle.textContent = open ? '▸ 에이전트 상세 보기' : '▾ 에이전트 상세 닫기';
        detail.style.display = open ? 'none' : 'block';
      });
    }
    scrollBottom();
  }

  function renderAgentDetail(agent) {
    const ev = (agent.evidence || [])[0];
    return `
      <div style="margin-bottom:10px">
        <h4>${esc(agent.agent || 'agent')}</h4>
        <p>${esc(agent.answer || '')}</p>
        ${ev ? `<p style="margin-top:6px;font-size:0.82rem;color:#6b5344">
          근거: ${esc(ev.id || '')} · ${esc((ev.source?.content || '').slice(0, 120))}…
        </p>` : ''}
      </div>`;
  }

  function appendLoading() {
    const row = makeRow('bot');
    row.innerHTML = `
      <div class="msg-avatar">AI</div>
      <div class="msg-body">
        <div class="bubble">
          <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        </div>
      </div>`;
    chatEl.appendChild(row); scrollBottom();
    return row;
  }

  function appendError(msg) {
    const row = makeRow('bot');
    row.innerHTML = `
      <div class="msg-avatar">AI</div>
      <div class="msg-body">
        <div class="bubble"><div class="error-bubble">⚠ ${esc(msg)}</div></div>
        <div class="msg-time">${now()}</div>
      </div>`;
    chatEl.appendChild(row); scrollBottom();
  }

  function makeRow(type) {
    const el = document.createElement('div');
    el.className = `msg-row ${type}`;
    return el;
  }

  // ── TTS ──
  async function playAnswer(text, btn) {
    if (!text) return;
    if (answerAudio && !answerAudio.paused && activePlayBtn === btn) {
      answerAudio.currentTime = 0;
      await answerAudio.play();
      return;
    }
    btn.disabled = true;
    if (!btn.dataset.audioUrl) {
      btn.textContent = '⏳ 생성 중…';
    } else {
      btn.textContent = '⏳ 준비 중…';
    }
    try {
      stopCurrentAudio();

      if (!btn.dataset.audioUrl) {
        const res = await fetch('/tts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const blob = await res.blob();
        const audioUrl = URL.createObjectURL(blob);
        btn.dataset.audioUrl = audioUrl;
        cachedAudioUrls.add(audioUrl);
      }

      answerAudio = new Audio(btn.dataset.audioUrl);
      activePlayBtn = btn;
      answerAudio.onended = () => {
        btn.textContent = '▶ 음성 재생';
        btn.disabled = false;
        activePlayBtn = null;
      };
      await answerAudio.play();
      btn.textContent = '🔊 재생 중…';
      btn.disabled = false;
    } catch (err) {
      btn.textContent = '재생 실패'; btn.disabled = false;
      activePlayBtn = null;
    }
  }

  function stopCurrentAudio() {
    if (answerAudio) {
      answerAudio.pause();
      answerAudio = null;
    }
    if (activePlayBtn) {
      activePlayBtn.textContent = '▶ 음성 재생';
      activePlayBtn.disabled = false;
      activePlayBtn = null;
    }
  }

  window.addEventListener('beforeunload', () => {
    stopCurrentAudio();
    cachedAudioUrls.forEach((url) => URL.revokeObjectURL(url));
    cachedAudioUrls.clear();
  });

  // ── 유틸 ──
  function setSending(v) { sendBtn.disabled = v; }
  function scrollBottom() { chatScroll.scrollTop = chatScroll.scrollHeight; }
  function now() { return new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }); }

  function preferredMime() {
    if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) return 'audio/webm;codecs=opus';
    if (MediaRecorder.isTypeSupported('audio/webm')) return 'audio/webm';
    return '';
  }
  function stopStream() { recStream?.getTracks().forEach(t => t.stop()); recStream = null; }

  function normalizePayload(payload) {
    if (payload == null) return {};
    if (Array.isArray(payload)) return normalizePayload(payload[0] || {});
    if (typeof payload === 'string') { try { return normalizePayload(JSON.parse(payload)); } catch { return { finalAnswer: payload }; } }
    if (typeof payload !== 'object') return {};
    if (payload.json && typeof payload.json === 'object') return normalizePayload(payload.json);
    const n = { ...payload };
    if (n.finalAnswer == null && typeof n.final_answer === 'string') n.finalAnswer = n.final_answer;
    if (!Array.isArray(n.agentResults) && Array.isArray(n.agent_results)) n.agentResults = n.agent_results;
    return n;
  }

  function esc(v) {
    return String(v ?? '')
            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }

  // ── n8n 상태 폴링 ──
  const n8nDotEl   = document.getElementById('n8n-dot');
  const n8nLabelEl = document.getElementById('n8n-label');

  async function pollN8nStatus() {
    try {
      const res  = await fetch('/n8n/status');
      const data = await res.json();
      const up   = data.status === 'up';
      n8nDotEl.className   = 'n8n-dot ' + (up ? 'up' : 'down');
      n8nLabelEl.textContent = up ? 'n8n 연결됨' : 'n8n 연결 안됨';
      n8nLabelEl.style.color = up ? 'var(--accent)' : 'var(--danger)';
    } catch {
      n8nDotEl.className   = 'n8n-dot down';
      n8nLabelEl.textContent = 'n8n 연결 안됨';
      n8nLabelEl.style.color = 'var(--danger)';
    }
  }

  pollN8nStatus();
  setInterval(pollN8nStatus, 5000);
</script>
</body>
</html>
