input {
  file {
    path => "/data-seed/delivery-orders.jsonl"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb-delivery-orders"
    discover_interval => 5
    codec => json
    add_field => {
      "[@metadata][target_index]" => "delivery-orders-v1"
      "[@metadata][document_kind]" => "order"
    }
  }

  file {
    path => "/data-seed/refund-exchange-orders.jsonl"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb-refund-exchange-orders"
    discover_interval => 5
    codec => json
    add_field => {
      "[@metadata][target_index]" => "refund-exchange-orders-v1"
      "[@metadata][document_kind]" => "order"
    }
  }

  file {
    path => "/data-seed/support-manuals.jsonl"
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb-support-manuals"
    discover_interval => 5
    codec => json
    add_field => {
      "[@metadata][target_index]" => "support-manuals-v1"
      "[@metadata][document_kind]" => "manual"
    }
  }
}

filter {
  if [@metadata][document_kind] == "order" {
    mutate {
      add_field => {
        "[@metadata][document_id]" => "%{orderId}"
      }
    }
  } else if [@metadata][document_kind] == "manual" {
    mutate {
      add_field => {
        "[@metadata][document_id]" => "%{manualId}"
      }
    }
  }

  mutate {
    remove_field => ["@version", "host", "log", "event", "message"]
  }
}

output {
  elasticsearch {
    hosts => ["https://es01:9200"]
    ssl_enabled => true
    ssl_certificate_authorities => "/usr/share/logstash/config/certs/ca/ca.crt"
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    index => "%{[@metadata][target_index]}"
    document_id => "%{[@metadata][document_id]}"
  }
  stdout { codec => rubydebug }
}
